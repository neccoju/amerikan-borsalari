# Global runtime settings for usbot. Safe defaults; no secrets here.

run:
  timezone: "America/New_York"   # market reference timezone
  dry_run: false                 # if true, never sends email; logs only
  log_level: "INFO"

universe:
  source: "sp1500"               # sp500 | sp1500 | broad | watchlist | both
                                 # sp1500/broad = S&P 500 + 400 (mid) + 600 (small)
  include_watchlist: true
  # Liquidity / size filters applied to the daily active universe.
  min_market_cap: 1000000000     # 1B floor (lower so mid/small caps qualify)
  min_avg_dollar_volume: 5000000 # 5M USD/day
  min_price: 3.0                 # exclude sub-$3 penny stocks
  watchlist_relax_filters: true  # watchlist names bypass the market-cap floor
  # Practical ceiling: after the price/volume filter we keep the N most liquid
  # names (then fetch fundamentals only for those). Raise for broader coverage at
  # the cost of runtime / API usage.
  max_names: 750

data:
  history_days: 420              # ~ enough for 200DMA + 12M momentum
  cache_ttl_hours: 12
  cache_dir: "data/raw"
  price_fallback_max: 60         # max symbols retried via Stooq when yfinance misses
  fundamentals_ttl_days: 7       # quarterly data: weekly rolling refresh loses nothing
  fundamentals_finnhub_max: 150  # per-run Finnhub budget for names yfinance missed;
                                 # with the cache this converges to full coverage
  benchmarks: ["SPY", "QQQ", "RSP"]
  macro_tickers:                 # fetched via yfinance (keyless) as a fallback
    spy: "SPY"
    qqq: "QQQ"
    iwm: "IWM"
    vix: "^VIX"
    tnx: "^TNX"                  # 10Y yield proxy

database:
  # Full trade/snapshot/LLM-review archive. Lives under state/ so the workflow's
  # commit-back step persists it across ephemeral CI runners (like the JSON book).
  path: "state/usbot.db"

portfolios:
  model_capital: 1000.0
  active_capital: 1600.0
  active_txn_cost: 1.5           # USD per buy/sell
  self_learning_capital: 1000.0  # paper only
  rebalance: "month_end"         # model portfolios rebalance on last trading day
  rebalance_band: 0.015          # no-trade zone: skip drifts < 1.5% of the book
                                 # (cuts turnover; only meaningful deltas trade)
  fill_timing: "t1_open"         # Active sleeve: "t1_open" queues entries decided
                                 # at today's close and fills them at the NEXT
                                 # session's open (removes fill-at-observed-close
                                 # look-ahead). "close" = legacy immediate fill.
                                 # Risk exits are always immediate either way.
  active_initial_deploy_pct: 0.25
  min_cash_buffer_pct: 0.05
  # All sleeves persist here across runs (committed back by the workflow) so they
  # hold real positions bought at live prices and accumulate real P/L.
  state_path: "state/portfolios.json"

# Per-sleeve risk controls. inv_vol_weight blends score-proportional sizing
# toward inverse-volatility (risk parity); circuit_breaker de-risks a sinking
# book between rebalances (drawdown from peak equity), trimming to
# circuit_breaker_cash fraction in cash.
risk:
  growth:    { max_position: 0.12, max_sector: 0.30, max_names: 15,
               inv_vol_weight: 0.30, circuit_breaker: 0.25, circuit_breaker_cash: 0.50 }
  defensive: { max_position: 0.10, max_sector: 0.25, max_names: 15, max_beta: 0.80,
               inv_vol_weight: 0.55, circuit_breaker: 0.18, circuit_breaker_cash: 0.50 }
  balanced:  { max_position: 0.10, max_sector: 0.28, max_names: 15,
               inv_vol_weight: 0.40, circuit_breaker: 0.22, circuit_breaker_cash: 0.50 }
  self_learning: { inv_vol_weight: 0.35 }
  active:    { max_position: 0.15, max_sector: 0.35, max_daily_turnover: 0.25,
               min_expected_edge_after_cost: 0.0,
               trail_drawdown: -0.15 }   # exit when 15% below the position's high-water mark

news:
  enabled: true                  # auto-skips if no FINNHUB/ALPHA_VANTAGE key
  lookback_days: 3
  max_per_symbol: 10
  sentiment_model: "vader"       # vader | finbert (finbert needs transformers)
  top_n: 50                      # only fetch news for the top-N names by prelim score
                                 # (bounds per-symbol API calls on a broad universe)

institutional:
  enabled: true                  # 13F via SEC EDGAR (needs [sec] extra / edgartools)
                                 # experimental: slow-moving quarterly confirmation

congress:
  enabled: true                  # keyless public datasets; auto-skips if unreachable
  lookback_days: 90              # disclosure data is delayed; use a wide window

insider:
  enabled: true                  # SEC Form 4 via Finnhub free tier; needs FINNHUB key
  lookback_days: 90              # window for open-market buys/sells
  max_symbols: 120               # bounded to the top-N scored names (shares Finnhub quota)

earnings:
  enabled: true                  # PEAD + earnings blackout via Finnhub free tier
  lookback_days: 90              # drift window for recent surprises
  blackout_days: 5               # Active sleeve won't open a new position within N days
                                 # of a scheduled report (avoids a binary earnings bet)
  max_symbols: 120

short_interest:
  enabled: true                  # keyless: derived from yfinance .info fundamentals
  level_weight: 0.6              # blend of short-interest LEVEL (0.6) vs month-over-month
                                 # CHANGE (0.4); both bearish when high/rising

email:
  enabled: true                  # auto-disabled if SMTP secrets are missing
  subject_prefix: "[usbot]"

dashboard:
  enabled: true                  # generate site/index.html each run (never blocks email)
  out_path: "site/index.html"    # published via the Pages workflow / uploaded artifact

llm:
  enabled: true                  # auto-disabled if no key / provider=none
  monthly_only: true             # do NOT run on daily runs (cost control)
  max_adjustment_points: 5.0     # LLM can only nudge composite by +/- this

learning:                        # adaptive Self-Learning sleeve (paper only)
  learning_rate: 0.25            # online exponential-gradient step (conservative)
  ic_ema_alpha: 0.4              # EMA over stored monthly ICs; updates follow
                                 # persistent factor efficacy, not one lucky month
  min_weight: 0.05               # per-factor weight bounds
  max_weight: 0.50

backtest:
  start_date: "2015-01-01"
  benchmark: "SPY"
